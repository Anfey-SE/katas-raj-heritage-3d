<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capture-to-3D — First View</title>
<style>
  body { margin: 0; background: #0d1117; overflow: hidden; font-family: sans-serif; }
  #ui {
    position: absolute; top: 16px; left: 16px; color: #d4af37;
    font-size: 0.9rem; letter-spacing: 0.5px; z-index: 10;
  }
  #hint {
    position: absolute; bottom: 16px; left: 16px; color: #8b949e;
    font-size: 0.75rem; z-index: 10;
  }
</style>
</head>
<body>
<div id="ui">CAPTURE-TO-3D · FIRST VIEW</div>
<div id="hint">Drag to orbit · scroll to zoom · images arranged from multi-angle capture</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const photoUrls = [
  "katas_raj_1.png",
  "katas_raj_2.jpeg",
  "katas_raj_3.jpeg",

];

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 0.9);
scene.add(ambient);
const point = new THREE.PointLight(0xd4af37, 0.6);
point.position.set(0, 5, 5);
scene.add(point);

// Rig that holds all the capture planes — this represents the "reconstructed" object
const rig = new THREE.Group();
scene.add(rig);

const loader = new THREE.TextureLoader();
const radius = 3.2;

photoUrls.forEach((url, i) => {
  const angle = (i / photoUrls.length) * Math.PI * 2;
  const geo = new THREE.PlaneGeometry(2.4, 3.2);
  const mat = new THREE.MeshBasicMaterial({
    map: loader.load(url),
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.92
  });
  const plane = new THREE.Mesh(geo, mat);
  plane.position.set(Math.sin(angle) * radius, 0, Math.cos(angle) * radius);
  plane.lookAt(0, 0, 0);
  rig.add(plane);
});

// Faint point-cloud ring to sell the "3D reconstruction" feel
const cloudGeo = new THREE.BufferGeometry();
const cloudCount = 800;
const positions = new Float32Array(cloudCount * 3);
for (let i = 0; i < cloudCount; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = radius * (0.7 + Math.random() * 0.5);
  const h = (Math.random() - 0.5) * 4;
  positions[i*3] = Math.sin(a) * r;
  positions[i*3+1] = h;
  positions[i*3+2] = Math.cos(a) * r;
}
cloudGeo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
const cloudMat = new THREE.PointsMaterial({ color: 0x39a0ff, size: 0.03, transparent: true, opacity: 0.35 });
scene.add(new THREE.Points(cloudGeo, cloudMat));

// Manual orbit controls (drag to rotate, scroll to zoom) — no OrbitControls import needed
let isDragging = false, prevX = 0, prevY = 0;
let rotX = 0, rotY = 0;

renderer.domElement.addEventListener("mousedown", e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
window.addEventListener("mouseup", () => isDragging = false);
window.addEventListener("mousemove", e => {
  if (!isDragging) return;
  rotY += (e.clientX - prevX) * 0.005;
  rotX += (e.clientY - prevY) * 0.005;
  rotX = Math.max(-0.8, Math.min(0.8, rotX));
  prevX = e.clientX; prevY = e.clientY;
});
renderer.domElement.addEventListener("wheel", e => {
  camera.position.z = Math.max(3, Math.min(14, camera.position.z + e.deltaY * 0.01));
});

function animate() {
  requestAnimationFrame(animate);
  rig.rotation.y += 0.002; // gentle auto-rotate
  camera.position.x = Math.sin(rotY) * camera.position.z;
  camera.position.z = Math.cos(rotY) * Math.abs(camera.position.z) * Math.sign(Math.cos(rotY) || 1);
  camera.position.y = 1.5 + rotX * 4;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
