<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capture-to-3D — Depth Relief</title>
<style>
  body { margin: 0; background: #0a0f0d; overflow: hidden; font-family: 'IBM Plex Mono', monospace; }
  #ui { position: absolute; top: 14px; left: 16px; color: #35a897; font-size: 0.8rem; letter-spacing: 1px; z-index: 10; text-transform: uppercase; }
  #hint { position: absolute; bottom: 14px; left: 16px; color: #6b7a76; font-size: 0.68rem; z-index: 10; }
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #35a897; font-size: 0.8rem; z-index: 20; }
</style>
</head>
<body>
<div id="ui">CAPTURE-TO-3D · DEPTH RELIEF (FIRST PASS)</div>
<div id="hint">Drag to orbit · scroll to zoom · relief generated from photo luminance</div>
<div id="loading">Building relief mesh…</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const PHOTO = "photo1.jpg"; // change this to whichever photo you want the relief built from

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0f0d);
scene.fog = new THREE.Fog(0x0a0f0d, 6, 16);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 3.2, 5.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0x9fe8da, 1.1);
key.position.set(3, 6, 4);
scene.add(key);
const rim = new THREE.PointLight(0x35a897, 0.8);
rim.position.set(-4, 2, -3);
scene.add(rim);

// Faint scan-grid floor for lab/survey feel
const grid = new THREE.GridHelper(14, 28, 0x1f3d38, 0x14231f);
grid.position.y = -1.4;
scene.add(grid);

const rig = new THREE.Group();
scene.add(rig);

const img = new Image();
img.crossOrigin = "anonymous";
img.onload = () => {
  const w = 128, h = Math.round(128 * img.height / img.width);
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, w, h);
  const data = ctx.getImageData(0, 0, w, h).data;

  const geo = new THREE.PlaneGeometry(4.6, 4.6 * h / w, w - 1, h - 1);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const px = i % w;
    const py = Math.floor(i / w);
    const idx = (py * w + px) * 4;
    const lum = (data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114) / 255;
    pos.setZ(i, lum * 0.9); // displacement = "depth"
  }
  geo.computeVertexNormals();

  const texture = new THREE.Texture(canvas);
  texture.needsUpdate = true;
  const fullResCanvas = document.createElement("canvas");
  fullResCanvas.width = img.width; fullResCanvas.height = img.height;
  fullResCanvas.getContext("2d").drawImage(img, 0, 0);
  const fullTexture = new THREE.Texture(fullResCanvas);
  fullTexture.needsUpdate = true;

  const mat = new THREE.MeshStandardMaterial({
    map: fullTexture,
    roughness: 0.85,
    metalness: 0.05,
    side: THREE.DoubleSide,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -0.15;
  rig.add(mesh);

  // Wireframe ghost overlay for that "reconstruction" look
  const wireMat = new THREE.MeshBasicMaterial({ color: 0x35a897, wireframe: true, transparent: true, opacity: 0.12 });
  const wireMesh = new THREE.Mesh(geo, wireMat);
  wireMesh.rotation.copy(mesh.rotation);
  wireMesh.position.z = 0.01;
  rig.add(wireMesh);

  document.getElementById("loading").style.display = "none";
};
img.onerror = () => {
  document.getElementById("loading").textContent = "Could not load " + PHOTO + " — check filename.";
};
img.src = PHOTO;

let isDragging = false, prevX = 0, prevY = 0, rotY = 0.3, rotX = 0;
renderer.domElement.addEventListener("mousedown", e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
window.addEventListener("mouseup", () => isDragging = false);
window.addEventListener("mousemove", e => {
  if (!isDragging) return;
  rotY += (e.clientX - prevX) * 0.006;
  rotX += (e.clientY - prevY) * 0.006;
  rotX = Math.max(-0.6, Math.min(0.6, rotX));
  prevX = e.clientX; prevY = e.clientY;
});
renderer.domElement.addEventListener("wheel", e => {
  camera.position.z = Math.max(2.5, Math.min(9, camera.position.z + e.deltaY * 0.006));
});

function animate() {
  requestAnimationFrame(animate);
  rig.rotation.y = rotY;
  camera.position.y = 3.2 - rotX * 3;
  camera.lookAt(0, 0.3, 0);
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
